name: Achievement Hub CI

on:
  push:
    branches:
      - main
      - steam-integration

  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install backend packages
        run: npm ci

      - name: Run Jest and Supertest
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: github-actions-test-secret

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend packages
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5050
          VITE_GOOGLE_CLIENT_ID: ""
