name: Achievement Hub CI/CD

on:
  push:
    branches:
      - main
      - steam-integration

  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install backend packages
        run: npm ci

      - name: Run Jest and Supertest
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: github-actions-test-secret

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend packages
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5050
          VITE_GOOGLE_CLIENT_ID: ""

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/achievementhub_deploy
          chmod 600 ~/.ssh/achievementhub_deploy
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/achievementhub_deploy \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" <<'REMOTE'
          set -e

          cd /var/www/achievement-hub

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          cd api
          npm ci --omit=dev
          pm2 restart achievement-hub-api --update-env

          cd ../frontend
          npm ci
          npm run build

          systemctl reload apache2
          REMOTE
